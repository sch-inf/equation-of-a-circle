<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Генератор кіл</title>
  <style>
    :root {
      --bg: #f6f8f9;
      --card: #ffffff;
      --accent: #4aa;
      --text: #1f2a30;
      --muted: #6b7b86;
      --border: #d9e1e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      display: grid;
      gap: 16px;
    }

    h2 {
      margin: 0;
      text-align: center;
      font-weight: 600;
    }

    .groups{
          display:flex;
      gap:16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    canvas {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 100%;
      height: auto;
    }

    *:not(details[open]).center {
      display: flex;
      justify-content: center;
    }
    
    .equation {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    #paramsOnScreen {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    button {
      align-self: center;
      padding: 10px 18px;
      font-size: 15px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    details {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    summary {
      cursor: pointer;
      font-weight: 600;
    }

    .spoiler-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  #dop-overlay{visibility:hidden};

    @media (max-width: 760px) {
      .spoiler-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="app">

<h2>Генератор кіл</h2>

<div class="card">
<div class="controls">
  <label><input type="checkbox" id="showCircle" checked> коло</label>
  <label><input type="checkbox" id="showCenter" checked> центр кола</label>
  <label><input type="checkbox" id="showEquation" checked> рівняння кола</label>
  <label><input type="checkbox" id="showParams" checked> параметри кола</label>
</div>
</div>
<div class="groups center">
<div class="card ">
<canvas id="plane" width="420" height="420"></canvas></div>
<div class="card">
  <div class="equation" id="equation"></div>
  <div id="paramsOnScreen"></div>  
</div>
</div>
<details class="card center">
  <summary>Повна інформація</summary>
  <div class="spoiler-grid">
    <div id="fullInfo"></div>
    <canvas id="planeCopy" width="420" height="420"></canvas>
  </div>
</details>

<button id="regen">Оновити</button>

</div>

<script>
  const size = 9;
  const canvas = document.getElementById('plane');
  const ctx = canvas.getContext('2d');
  const canvasCopy = document.getElementById('planeCopy');
  const ctxCopy = canvasCopy.getContext('2d');
  const scale = canvas.width / (size * 2);

  const equationEl = document.getElementById('equation');
  const fullInfo = document.getElementById('fullInfo');
  const paramsOnScreen = document.getElementById('paramsOnScreen');

  const checks = {
    circle: document.getElementById('showCircle'),
    center: document.getElementById('showCenter'),
    equation: document.getElementById('showEquation'),
    params: document.getElementById('showParams')
  };

  let current = { a: 0, b: 0, r: 1 };

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function circleEquation(a, b, r) {
    const xPart = a === 0 ? 'x²' : `(x${a > 0 ? '-' + a : '+' + (-a)})²`;
    const yPart = b === 0 ? 'y²' : `(y${b > 0 ? '-' + b : '+' + (-b)})²`;
    return `${xPart} + ${yPart} = ${r * r}`;
  }

  function drawGrid(context, targetCanvas) {
    context.clearRect(0, 0, targetCanvas.width, targetCanvas.height);

    context.strokeStyle = '#ddd';
    context.lineWidth = 1;

    for (let i = -size; i <= size; i++) {
      context.beginPath();
      context.moveTo((i + size) * scale, 0);
      context.lineTo((i + size) * scale, targetCanvas.height);
      context.stroke();

      context.beginPath();
      context.moveTo(0, (size - i) * scale);
      context.lineTo(targetCanvas.width, (size - i) * scale);
      context.stroke();
    }

    context.strokeStyle = '#000';
    context.lineWidth = 2;

    context.beginPath();
    context.moveTo(size * scale, 0);
    context.lineTo(size * scale, targetCanvas.height);
    context.stroke();

    context.beginPath();
    context.moveTo(0, size * scale);
    context.lineTo(targetCanvas.width, size * scale);
    context.stroke();

    context.fillStyle = '#000';
    context.font = '12px Arial';

    for (let i = -size; i <= size; i++) {
      if (i === 0) continue;
      context.fillText(i, (i + size) * scale - 4, size * scale + 14);
      context.fillText(i, size * scale + 4, (size - i) * scale + 4);
    }

    context.font = '14px Arial';
    context.fillText('x', targetCanvas.width - 14, size * scale - 6);
    context.fillText('y', size * scale + 6, 14);
  }

  function drawCircle(context, a, b, r, showCenter) {
    context.strokeStyle = '#0066aa';
    context.lineWidth = 2;

    context.beginPath();
    context.arc((a + size) * scale, (size - b) * scale, r * scale, 0, Math.PI * 2);
    context.stroke();

    if (showCenter) {
      context.fillStyle = '#cc0000';
      context.beginPath();
      context.arc((a + size) * scale, (size - b) * scale, 4, 0, Math.PI * 2);
      context.fill();
    }
  }

  function render() {
    const showPlane = checks.circle.checked || checks.center.checked;

    canvas.style.display = showPlane ? 'block' : 'none';
    equationEl.style.display = checks.equation.checked ? 'block' : 'none';

    if (showPlane) {
      drawGrid(ctx, canvas);
      if (checks.circle.checked) {
        drawCircle(ctx, current.a, current.b, current.r, checks.center.checked);
      }
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    equationEl.textContent = checks.equation.checked
      ? circleEquation(current.a, current.b, current.r)
      : '';

    if (checks.params.checked) {
      paramsOnScreen.style.display = 'block';
      paramsOnScreen.innerHTML = `<strong>Центр:</strong> (${current.a}; ${current.b}) &nbsp;&nbsp; <strong>Радіус:</strong> ${current.r}`;
    } else {
      paramsOnScreen.style.display = 'none';
      paramsOnScreen.innerHTML = '';
    }

    fullInfo.innerHTML = `
      <p><strong>Рівняння:</strong> ${circleEquation(current.a, current.b, current.r)}</p>
      <p><strong>Центр:</strong> (${current.a}; ${current.b})</p>
      <p><strong>Радіус:</strong> ${current.r}</p>
    `;

    drawGrid(ctxCopy, canvasCopy);
    drawCircle(ctxCopy, current.a, current.b, current.r, true);
  }

  function generate() {
    current = {
      a: randInt(-5, 5),
      b: randInt(-5, 5),
      r: randInt(1, 3)
    };
    render();
  }

  Object.values(checks).forEach(cb => cb.addEventListener('change', render));
  document.getElementById('regen').addEventListener('click', generate);

  generate();
</script>

</body>
</html>
