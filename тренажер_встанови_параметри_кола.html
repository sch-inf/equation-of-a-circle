<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Тренажер: віднови коло</title>
<style>
:root{
  --bg:#f7f9fb;
  --card:#ffffff;
  --accent:#4aa;
  --accent-soft:#dff3f3;
  --text:#1f2937;
  --muted:#6b7280;
}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body{margin:0;background:var(--bg);color:var(--text)}
.container{max-width:900px;margin:auto;padding:16px}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.stats{display:flex;gap:16px;font-weight:500}
.stats span{color:var(--muted)}
.canvas-wrap{display:flex;justify-content:center}
canvas{background:#fff;border-radius:12px;border:1px solid #e5e7eb;max-width:100%}
.inputs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:12px}
input{padding:8px 10px;border-radius:8px;border:1px solid #d1d5db;font-size:16px}
button{padding:10px 16px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.message{margin-top:12px;font-weight:600}
.message.ok{color:#16a34a}
.message.bad{color:#dc2626}
.hint{margin-top:8px;color:var(--muted);font-size:14px}
@media(max-width:500px){.stats{flex-direction:column;gap:4px}}
</style>
</head>
<body>
<div class="container">
  <div class="card header">
    <h2>🎯 Віднови коло</h2>
    <div class="stats">
      <div>✅ Правильно: <span id="score">0</span></div>
      <div>⏱ Час: <span id="time">0</span> c</div>
    </div>
  </div>

  <div class="card">
    <div class="canvas-wrap">
      <canvas id="plane" width="400" height="400"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="inputs">
      <label>x: <input type="number" id="x" value="0" /></label>
      <label>y: <input type="number" id="y" value="0" /></label>
      <label>R: <input type="number" id="r" value="1" /></label>
    </div>
    <div class="buttons">
      <button id="check">Перевірити</button>
    </div>
    <div id="msg" class="message"></div>
    <div class="hint">Сіре коло — твоя відповідь, бірюзове — еталон</div>
  </div>
</div>

<script>
const canvas = document.getElementById('plane');
const ctx = canvas.getContext('2d');
const size = 9;
const step = canvas.width / (size*2);

let current = {};
let score = 0;
let startTime = Date.now();

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}

function newCircle(){
  current = {x: rand(-5,5), y: rand(-5,5), r: rand(1,5)};
  drawGrid();
  drawTarget();
  document.getElementById('msg').textContent='';
}

function drawGrid(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#e5e7eb';
  ctx.font='12px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  for(let i=-size;i<=size;i++){
    ctx.beginPath();
    ctx.moveTo(0, canvas.height/2 + i*step);
    ctx.lineTo(canvas.width, canvas.height/2 + i*step);
    ctx.stroke();
    if(i!==0){ctx.fillText(i, canvas.width/2 - 12, canvas.height/2 - i*step)}

    ctx.beginPath();
    ctx.moveTo(canvas.width/2 + i*step, 0);
    ctx.lineTo(canvas.width/2 + i*step, canvas.height);
    ctx.stroke();
    if(i!==0){ctx.fillText(i, canvas.width/2 + i*step, canvas.height/2 + 12)}
  }

  ctx.strokeStyle='#111';
  ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
  ctx.fillText('0', canvas.width/2 - 10, canvas.height/2 + 10);
}

function drawTarget(){
  ctx.setLineDash([6,6]);
  ctx.strokeStyle='#4aa';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(canvas.width/2 + current.x*step, canvas.height/2 - current.y*step, current.r*step, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle='#dc2626';
  ctx.beginPath();
  ctx.arc(canvas.width/2 + current.x*step, canvas.height/2 - current.y*step, 4,0,Math.PI*2);
  ctx.fill();
}

function drawUser(x,y,r){
  ctx.setLineDash([4,4]);
  ctx.strokeStyle='#9ca3af';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(canvas.width/2 + x*step, canvas.height/2 - y*step, r*step, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.arc(canvas.width/2 + x*step, canvas.height/2 - y*step, 4,0,Math.PI*2);
  ctx.fill();
}

function check(){
  const x = Number(document.getElementById('x').value);
  const y = Number(document.getElementById('y').value);
  const r = Number(document.getElementById('r').value);
  const msg = document.getElementById('msg');

  drawGrid();
  drawTarget();
  drawUser(x,y,r);

  if(x===current.x && y===current.y && r===current.r){
    score++;
    document.getElementById('score').textContent=score;
    msg.textContent='✅ Правильно!';
    msg.className='message ok';
    setTimeout(newCircle, 2000); // нове коло через 2 секунди
  } else {
    msg.textContent='❌ Неправильно, спробуй ще';
    msg.className='message bad';
  }
}

setInterval(()=>{
  document.getElementById('time').textContent = Math.floor((Date.now()-startTime)/1000);
},1000);

newCircle();
document.getElementById('check').onclick = check;
</script>
</body>
</html>
